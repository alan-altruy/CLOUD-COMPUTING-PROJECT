<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" rel="stylesheet" />
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}" type="image/x-icon">
    <title>Image Search Engine</title>
</head>

<body>
    <div class="site-wrapper">
        <div class="header">

            <img src="../static/images/logo.svg" alt="Logo" class="logo"
                >

            <div class="flex-grow-1">
                <span>Cloud & Edge Computing</span>
            </div>

            <div class="header-right">
                <div class="course-code">I-ILIA-208</div>
                <a href="{{ url_for('logout') }}" class="btn btn-sm btn-danger mt-1 logout-btn">Logout</a>
            </div>

        </div>


        <div class="container index-container">

            <h1 class="form-title">Image Search Engine</h1>

            <form id="search-form" action="/search" method="post">
                <div class="form-group">
                    <label for="file">Upload an image*:</label>
                    <input type="file" name="file" id="file" class="d-none" accept="image/*" required>

                    <div id="drop-area">

                    
                        <!-- Zone de drag-and-drop / sélection -->
                        <div id="drop-zone">
                            <h3 class="m-2">Drag & drop</h3>
                            <button for="file" class="btn btn-success browse-btn">Browse</button>
                        </div>

                        <!-- Preview avec bouton de suppression -->
                        <div id="preview-container" class="d-none">
                            <div>
                                <img id="preview" class="preview d-none img-fluid" alt="Image Preview">
                                <button id="remove-image" class="remove-button d-none btn btn-sm btn-danger">x</button>                        
                            </div>
                        </div>

                    </div>
                </div>
                

                <div class="form-group">
                    
                    
                </div>
               <div class="form-group">
                    <label for="descriptor">Select model(s) for features extraction*:</label>
                        <select name="descriptor[]" id="descriptor" class="form-control" multiple required style="width: 100%">
                        <option value="resnet50">Resnet50</option>
                        <option value="mobilenet">MobileNet</option>
                        <option value="vit_b_16">ViT</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="similarity">Select similarity measure*:</label>
                    <select name="similarity" id="similarity" class="form-control" required>
                        <option value="euclidean">Euclidean</option>
                        <option value="correlation">Correlation</option>
                        <option value="chi-square">Chi-square</option>
                        <option value="cosine_distance">Cosine Distance</option>
                        <option value="bhattacharyya">Bhattacharyya</option>
                        <option value="brute-force-matcher">Brute Force Matcher</option>
                        <option value="flann">FLANN</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="image_class">Class of the image (Leave "None" if you don't know the class):</label>
                    <select name="image_class" id="image_class" class="form-control" required>
                        <option value="">None</option>
                        <option value="0">Africa</option>
                        <option value="1">Beach</option>
                        <option value="2">Buildings</option>
                        <option value="3">Buses</option>
                        <option value="4">Dinosaurs</option>
                        <option value="5">Elephants</option>
                        <option value="6">Flowers</option>
                        <option value="7">Horses</option>
                        <option value="8">Mountains</option>
                        <option value="9">Food</option>
                    </select>
                </div>


                <div class="form-group">
                    <label for="topn">Top N results*:</label>
                    <select name="topn" id="topn" class="form-control" required>
                        <option value="20">20</option>
                        <option value="50">50</option>
                    </select>
                </div>
                <input type="hidden" name="filename" id="filename">
                <button type="submit" class="btn btn-primary search-button" id="search-button" disabled="True">Search</button>

            </form>
            <div id="loading-spinner" class="loading-spinner d-none">
                    <div class="spinner-border text-light" role="status">
                        <span class="sr-only">Loading...</span>
                    </div>
            </div>
            
            <div class="result-container" id="result-container">
                <!-- Results will be displayed here -->
            </div>
        
            <div id="predicted-container" class="d-none">
                <div class="predicted-content">
                    <p class="mb-1">
                        <span id="specified-class" class="text-primary"></span>
                    </p>
                    <p class="mb-1">
                        <span id="predicted-class" class="text-success"></span>
                    </p>

                <p class="mb-0">
                    The Precision-Recall is computed using the specified class if provided; otherwise, the predicted class is used.
                </p>
                </div>
            </div>

            <div class="text-center mt-4">
                <img id="rp-curve" src="" alt="Precision-Recall Curve" class="d-none img-fluid">
            </div>
        </div>
    </div>
    <div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-xl">
            <div class="modal-content bg-dark">
            <div class="modal-body text-center">
                <img id="modalImage" src="" class="img-fluid" alt="Image en taille réelle">
            </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>

</html>
