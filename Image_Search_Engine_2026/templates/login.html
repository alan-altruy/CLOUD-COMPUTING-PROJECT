<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}" type="image/x-icon">
    <title>Connexion - Image Search Engine</title>
</head>

<body>
    <div class="site-wrapper">
        <div class="header">

            <img src="../static/images/logo.svg" alt="Logo" class="logo"
                >

            <div class="flex-grow-1">
                <span>Cloud & Edge Computing</span>
            </div>

            <div class="header-right">
                <div class="course-code-login">I-ILIA-208</div>
            </div>

        </div>

        <div class="container login-container">
            <h2 class="login-title">Connection</h2>

            <div id="login-alert" class="alert alert-danger d-none" role="alert"></div>

            <form id="login-form" action="/login" method="post">
                <div class="form-group">
                    <label for="email">Username</label>
                    <input type="text" class="form-control" id="email" name="email" placeholder="Username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="password" name="password" placeholder="********" required>
                        <div class="input-group-append">
                            <button class="btn btn-outline-light" type="button" id="toggle-password">Show</button>
                        </div>
                    </div>
                </div>

                <div class="form-group form-check">
                    <input type="checkbox" class="form-check-input" id="remember" name="remember">
                    <label class="form-check-label" for="remember" style="padding-left: 10px;">Remember me</label>
                </div>

                <button type="submit" id="login-button" class="btn btn-primary">Sign In</button>
            </form>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>

</html>
