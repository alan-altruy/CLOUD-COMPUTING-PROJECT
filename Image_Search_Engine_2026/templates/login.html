<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}" type="image/x-icon">
    <title>Connexion - Image Search Engine</title>
</head>

<body>
    <div class="site-wrapper d-flex flex-column align-items-center" style="min-width: 300px;">
        <div class="header w-100 d-flex justify-content-between align-items-center"
            style="max-width: 800px; top: 0; z-index: 999; background: transparent;">

            <img src="../static/images/logo.svg" alt="Logo" class="logo mb-2"
                style="max-width: 105px; max-height: 120px; object-fit: contain;">

            <div style="flex-grow: 1; text-align: center;">
                <span style="font-weight: bold; font-size: 1.8rem;">Cloud & Edge Computing</span>
            </div>

            <div style="font-weight: bold; font-size: 1.2rem; min-width: 100px; text-align: right;">
                I-ILIA-208
            </div>

        </div>

        <div class="container bg-dark text-white p-4 shadow rounded" style="opacity: 0.9; max-width: 560px;">
            <h2 class="text-center mb-3">Connection</h2>

            <div id="login-alert" class="alert alert-danger d-none" role="alert"></div>

            <form id="login-form" action="/login" method="post" class="p-3 rounded">
                <div class="form-group">
                    <label for="email">Username</label>
                    <input type="text" class="form-control" id="email" name="email" placeholder="your_username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="password" name="password" required>
                        <div class="input-group-append">
                            <button class="btn btn-outline-light" type="button" id="toggle-password">Show</button>
                        </div>
                    </div>
                </div>

                <div class="form-group form-check">
                    <input type="checkbox" class="form-check-input" id="remember" name="remember">
                    <label class="form-check-label" for="remember">Remember me</label>
                </div>

                <button type="submit" id="login-button" class="btn btn-primary btn-block">Sign In</button>
            </form>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>

</html>
